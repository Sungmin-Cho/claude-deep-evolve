name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: tests (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show bash version (M5.5 #4 — bash 3.2 visibility)
        run: bash --version

      - name: Run envelope + handoff round-trip tests
        run: npm test

      - name: Set up Python (for pytest hook suite)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest and runtime test deps
        # pyyaml: 5 test files (conftest.py + test_v31_fallback_note.py +
        # test_v31_resume_v31.py + test_v31_scheduler_decision.py +
        # test_v31_status_subcommand.py) parse / write session.yaml.
        run: python -m pip install --upgrade pip pytest pyyaml

      - name: Run pytest hook + helper suite
        run: pytest hooks/scripts/tests/ -q
