name: Codex release smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-codex-host-smoke:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact event head
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Authenticate exact PR/main provenance
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          EVENT_SHA: ${{ github.sha }}
          EVENT_REF: ${{ github.ref }}
          REF_PROTECTED: ${{ github.ref_protected }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          $ErrorActionPreference = 'Stop'
          $canonical = 'Sungmin-Cho/claude-deep-evolve'
          $head = (git rev-parse HEAD).Trim()
          if ($env:RUN_ATTEMPT -ne '1') {
            throw 'same-head reruns are not authoritative'
          }
          if ($env:REPOSITORY -ne $canonical) {
            throw "unexpected repository: $env:REPOSITORY"
          }
          if ($env:EVENT_NAME -eq 'pull_request') {
            if ($env:PR_HEAD_REPOSITORY -ne $canonical) {
              throw "fork PRs are not capture authority: $env:PR_HEAD_REPOSITORY"
            }
            if ($env:PR_BASE_REF -ne 'main') {
              throw "unexpected pull_request base: $env:PR_BASE_REF"
            }
            if ($head -ne $env:PR_HEAD_SHA) {
              throw "HEAD does not equal pull_request.head.sha"
            }
          } elseif ($env:EVENT_NAME -eq 'push' -or $env:EVENT_NAME -eq 'workflow_dispatch') {
            if ($env:EVENT_REF -ne 'refs/heads/main') {
              throw "main evidence requires refs/heads/main"
            }
            if ($env:REF_PROTECTED -ne 'true') {
              throw 'main evidence requires a protected ref'
            }
            if ($head -ne $env:EVENT_SHA) {
              throw 'HEAD does not equal GITHUB_SHA'
            }
            git fetch origin main --no-tags --depth=1
            $originMain = (git rev-parse origin/main).Trim()
            if ($head -ne $originMain) {
              throw 'HEAD does not equal origin/main'
            }
          } else {
            throw "unsupported event: $env:EVENT_NAME"
          }
          "DEEP_EVOLVE_BOOTSTRAP_COMMIT=$head" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Assert Node 22
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (node --version).TrimStart('v')
          if (-not $version.StartsWith('22.')) {
            throw "expected Node 22, got $version"
          }

      - name: Install exact Codex 0.144.1
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $npmrc = Join-Path $env:RUNNER_TEMP 'deep-evolve-empty.npmrc'
          Set-Content -NoNewline -LiteralPath $npmrc -Value ''
          npm install --global @openai/codex@0.144.1 --userconfig "$npmrc" --registry https://registry.npmjs.org/ --no-audit --no-fund
          Remove-Item -Force -LiteralPath $npmrc

      - name: Resolve host and native executable paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifact = Join-Path $env:RUNNER_TEMP 'deep evolve codex evidence'
          New-Item -ItemType Directory -Force -Path $artifact | Out-Null
          $globalRoot = (& npm root --global).Trim()
          $packageRoot = Join-Path $globalRoot '@openai\codex'
          $packageJsonPath = Join-Path $packageRoot 'package.json'
          if (-not (Test-Path -LiteralPath $packageJsonPath -PathType Leaf)) {
            throw 'exact Codex npm package is absent after installation'
          }
          $packageJson = Get-Content -Raw -LiteralPath $packageJsonPath | ConvertFrom-Json
          if ($packageJson.version -ne '0.144.1') {
            throw "unexpected Codex package version: $($packageJson.version)"
          }
          $native = @(Get-ChildItem -LiteralPath $globalRoot -Recurse -File -Filter 'codex.exe' |
            Where-Object { $_.FullName -match '@openai' })
          if ($native.Count -ne 1) {
            throw "expected one exact Codex native child binary, found $($native.Count)"
          }
          $node = (Get-Command node.exe -ErrorAction Stop).Source
          $git = (Get-Command git.exe -ErrorAction Stop).Source
          $gitSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $git).Hash.ToLowerInvariant()
          $programs = @($native[0].FullName, $node, $git) | Sort-Object -Unique
          $record = [ordered]@{
            package_root = $packageRoot
            package_version = $packageJson.version
            package_json_sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $packageJsonPath).Hash.ToLowerInvariant()
            host_executable = $native[0].FullName
            host_executable_sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $native[0].FullName).Hash.ToLowerInvariant()
            node_launcher = $node
            node_launcher_sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $node).Hash.ToLowerInvariant()
            git_executable = $git
            git_executable_sha256 = $gitSha256
            native_child_binary = $native[0].FullName
            program_paths = $programs
          }
          $record | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $artifact 'host-paths.json')
          "DEEP_EVOLVE_ARTIFACT_DIR=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append
          "DEEP_EVOLVE_HOST_COMMAND=$($native[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Establish Internet firewall block
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $record = Get-Content -Raw -LiteralPath (Join-Path $env:DEEP_EVOLVE_ARTIFACT_DIR 'host-paths.json') | ConvertFrom-Json
          $rules = @()
          $index = 0
          foreach ($program in $record.program_paths) {
            if (-not (Test-Path -LiteralPath $program -PathType Leaf)) {
              throw "resolved firewall program is absent: $program"
            }
            $name = "deep-evolve-codex-$env:GITHUB_RUN_ID-$index"
            New-NetFirewallRule -DisplayName $name -Direction Outbound -Program $program -Action Block -RemoteAddress Internet -Profile Any | Out-Null
            $rules += $name
            $index += 1
          }
          if ($rules.Count -lt 2) {
            throw 'host and Node firewall programs were not sealed'
          }
          $rules | ConvertTo-Json | Set-Content -LiteralPath (Join-Path $env:DEEP_EVOLVE_ARTIFACT_DIR 'firewall-rule-names.json')
          [ordered]@{
            established = $true
            direction = 'Outbound'
            action = 'Block'
            remote_address = 'Internet'
            program_paths = @($record.program_paths)
            rule_names = $rules
          } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $env:DEEP_EVOLVE_ARTIFACT_DIR 'firewall-receipt.json')

      - name: Run one secret-free loopback Codex host smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          node scripts/smoke-installed-codex-hook.cjs `
            --host-command "$env:DEEP_EVOLVE_HOST_COMMAND" `
            --artifact-dir "$env:DEEP_EVOLVE_ARTIFACT_DIR" `
            --bootstrap-commit "$env:DEEP_EVOLVE_BOOTSTRAP_COMMIT" `
            --run-id "$env:GITHUB_RUN_ID" `
            --job-id "$env:GITHUB_JOB" `
            --run-attempt "$env:GITHUB_RUN_ATTEMPT"

      - name: Remove Internet firewall block
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rules = @(Get-NetFirewallRule -DisplayName "deep-evolve-codex-$env:GITHUB_RUN_ID-*" -ErrorAction SilentlyContinue |
            ForEach-Object { $_.DisplayName })
          if ($env:DEEP_EVOLVE_ARTIFACT_DIR) {
            $ruleFile = Join-Path $env:DEEP_EVOLVE_ARTIFACT_DIR 'firewall-rule-names.json'
            if (Test-Path -LiteralPath $ruleFile) {
              $rules += @(Get-Content -Raw -LiteralPath $ruleFile | ConvertFrom-Json)
            }
          }
          $rules = @($rules | Sort-Object -Unique)
          foreach ($name in $rules) {
            Remove-NetFirewallRule -DisplayName $name -ErrorAction Stop
            if (Get-NetFirewallRule -DisplayName $name -ErrorAction SilentlyContinue) {
              throw "firewall rule remains after cleanup: $name"
            }
          }
          if ($env:DEEP_EVOLVE_ARTIFACT_DIR) {
            [ordered]@{ removed = $true; rule_names = $rules } | ConvertTo-Json -Depth 3 |
              Set-Content -LiteralPath (Join-Path $env:DEEP_EVOLVE_ARTIFACT_DIR 'firewall-cleanup.json')
          }

      - name: Upload secret-free raw Codex evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-loopback-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/deep evolve codex evidence
          if-no-files-found: error
          retention-days: 14
