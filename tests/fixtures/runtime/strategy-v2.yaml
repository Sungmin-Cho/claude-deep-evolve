version: 2
idea_selection:
  method: "weighted"
  weights: { parameter_tune: 0.15, refactor_simplify: 0.15, add_guard: 0.10, algorithm_swap: 0.15, data_preprocessing: 0.10, caching_memoization: 0.05, error_handling: 0.10, api_redesign: 0.10, test_expansion: 0.05, other: 0.05 }
  candidates_per_step: 3
  min_novelty_distance: 2
judgment:
  min_delta: 0.001
  crash_tolerance: 3
  marginal_policy: "discard"
  diagnose_retry:
    enabled: true
    max_per_session: 10
    severe_drop_delta: 0.05
    error_keywords: ["timeout", "nan", "inf", "shape mismatch", "exit 1", "traceback", "oom"]
convergence:
  consecutive_discard_limit: 10
  plateau_window: 15
  plateau_action: "branch"
exploration:
  radical_threshold: 20
  backtrack_enabled: true
  backtrack_strategy: "least_explored"
shortcut_detection:
  enabled: true
  auto_flag_delta: 0.05
  min_loc: 5
  cumulative_threshold: 3
  tier3_flagged_threshold: 3
  seal_prepare_read: false
legibility:
  enabled: true
  require_rationale_on_keep: true
  max_rationale_chars: 120
  block_identical_to_description: true
entropy_tracking:
  enabled: true
  window_size: 20
  collapse_threshold_bits: 1.5
x-description: "레거시 전략"
